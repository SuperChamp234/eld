name: H2 Picolibc Nightly

on:
  workflow_run:
    workflows: ["nightly picolibc builder"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max-artifact-age-hours:
        description: Maximum age for upstream nightly artifacts
        required: false
        default: '30'
      toolchain-run-id:
        description: Optional Nightly check run id for install-nightly-toolchain.tar.xz
        required: false
        default: ''
      picolibc-run-id:
        description: Optional picolibc-builder run id for install-hexagon-picolibc.tar.xz
        required: false
        default: ''

permissions:
  contents: read
  actions: read

jobs:
  h2-v68-g0:
    if: github.event_name == 'workflow_dispatch' || (github.repository == 'qualcomm/eld' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 480

    env:
      SCRIPT_DIR: ${{ github.workspace }}/.github/workflows/scripts
      TOOLCHAIN_DIR: ${{ github.workspace }}/install-nightly-toolchain
      PICOLIBC_ARTIFACT_DIR: ${{ github.workspace }}/install-hexagon-picolibc-artifact
      QEMU_SRC_DIR: ${{ github.workspace }}/qemu-system-hexagon
      QEMU_INSTALL_DIR: ${{ github.workspace }}/install-qemu-system-hexagon
      H2_INSTALL_DIR: ${{ github.workspace }}/install-h2-v68-g0
      H2_TARGET_TRIPLE: hexagon-unknown-h2-picolibc

    steps:
      - name: Checkout ELD
        uses: actions/checkout@v6

      - name: Set up Clang 20
        run: LLVM_VERSION=20 .github/workflows/scripts/install-llvm-apt.sh

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build make bison flex python3 \
            git jq xz-utils libglib2.0-dev libc++-dev libc++abi-dev

      - name: Download nightly toolchain with ELD
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_ID: nightly-test.yml
          ARTIFACT_NAME: install-nightly-toolchain.tar.xz
          DEST_DIR: ${{ github.workspace }}/artifacts
          REPO: ${{ github.repository }}
          BRANCH: main
          MAX_AGE_HOURS: ${{ github.event.inputs['max-artifact-age-hours'] || '30' }}
          RUN_ID: ${{ github.event.inputs['toolchain-run-id'] || '' }}
        run: $SCRIPT_DIR/h2-fetch-workflow-artifact.sh

      - name: Download nightly Hexagon picolibc
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_ID: picolibc-builder.yml
          ARTIFACT_NAME: install-hexagon-picolibc.tar.xz
          DEST_DIR: ${{ github.workspace }}/artifacts
          REPO: ${{ github.repository }}
          MAX_AGE_HOURS: ${{ github.event.inputs['max-artifact-age-hours'] || '30' }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs['picolibc-run-id'] || '' }}
        run: $SCRIPT_DIR/h2-fetch-workflow-artifact.sh

      - name: Extract and prepare toolchain
        run: |
          mkdir -p "$TOOLCHAIN_DIR"
          tar -xJf artifacts/install-nightly-toolchain.tar.xz -C "$TOOLCHAIN_DIR" --strip-components=1
          TOOLCHAIN_DIR="$TOOLCHAIN_DIR" "$SCRIPT_DIR/h2-install-toolchain-aliases.sh"
          echo "$TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Install nightly picolibc into H2 target layout
        run: |
          mkdir -p "$PICOLIBC_ARTIFACT_DIR"
          tar -xJf artifacts/install-hexagon-picolibc.tar.xz -C "$PICOLIBC_ARTIFACT_DIR"
          TOOLCHAIN_DIR="$TOOLCHAIN_DIR" \
          PICOLIBC_ARTIFACT_DIR="$PICOLIBC_ARTIFACT_DIR" \
          H2_TARGET_TRIPLE="$H2_TARGET_TRIPLE" \
          "$SCRIPT_DIR/h2-install-picolibc-artifact-g0.sh"

      - name: Checkout Hexagon Hypervisor
        uses: actions/checkout@v6
        with:
          repository: qualcomm/hexagon-hypervisor
          path: hexagon-hypervisor

      - name: Build qemu-system-hexagon
        run: |
          QEMU_SRC_DIR="$QEMU_SRC_DIR" \
          QEMU_INSTALL_DIR="$QEMU_INSTALL_DIR" \
          "$SCRIPT_DIR/h2-build-qemu-hexagon.sh"
          echo "$QEMU_INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Build H2 v68/G0 with picolibc
        run: |
          TOOLCHAIN_DIR="$TOOLCHAIN_DIR" \
          H2_DIR="$GITHUB_WORKSPACE/hexagon-hypervisor" \
          H2_INSTALL_DIR="$H2_INSTALL_DIR" \
          QEMU_SYSTEM_HEXAGON="$QEMU_INSTALL_DIR/bin/qemu-system-hexagon" \
          "$SCRIPT_DIR/h2-build-hypervisor-g0.sh"

      - name: Pack H2 artifact
        run: |
          tar -Jcvf install-h2-v68-g0.tar.xz -C "$GITHUB_WORKSPACE" install-h2-v68-g0

      - name: Upload H2 artifact
        uses: actions/upload-artifact@v7
        with:
          name: install-h2-v68-g0.tar.xz
          path: install-h2-v68-g0.tar.xz
          retention-days: 60

      - name: Upload H2 logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: h2-v68-g0-logs
          path: |
            install-h2-v68-g0/ver
          if-no-files-found: ignore
          retention-days: 60
